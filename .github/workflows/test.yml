name: Ruby Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true
    
    - name: Install dependencies
      run: bundle install
    
    - name: Run RuboCop
      run: bundle exec rubocop --format simple
    
    - name: Run tests with coverage
      env:
        CI: true  # Включаем режим CI для SimpleCov
      run: |
        bundle exec ruby test/test_password.rb
        bundle exec ruby test/test_storage.rb
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()  # Загружаем отчет даже если тесты упали
      with:
        name: coverage-report
        path: coverage/