name: Ruby Tests

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3' 
    
    - name: Run tests
      run: |
        ruby test/test_password.rb
        ruby test/test_storage.rb